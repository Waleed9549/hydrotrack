<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/hydrotrack/manifest.json" />
    <meta name="theme-color" content="#060d1a" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HydroTrack" />
    <link rel="apple-touch-icon" href="/hydrotrack/icons/icon-192.png" />

    <title>HydroTrack</title>
    <link rel="icon" type="image/svg+xml" href="/hydrotrack/drop.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/hydrotrack/sw.js")
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
